<!DOCTYPE html>

    <nav id="navbar">

                        <h3>ASCII视频播放器</h3>
                        <p>让你的视频变成字符，还能看出来原来的吗？</p>
                    </div>
                </a>
                <div class="container" style="text-align: center; align-self: center;">
                    <a href="products" class="btn">查看更多</a>
                </div>

        <div class="container">
            <h2><b>关于Me</b></h2>
            <div class="profile">
                <img src="favicon.ico" alt="profile picture" class="profile_img">
                <div class="bio">

                    <p>B站科技区UP主</p>
                    <p>简介：目前大部分时候私信必回，更新随缘，记得三连！[doge]</p>

                    <!-- 社交媒体链接 -->
                    <div class="social-links">
                        <a href="https://space.bilibili.com/2092212397" target="_blank" class="btn bilibili">哔哩哔哩空间</a>
                        <a href="https://github.com/SYSTEM-WIN-DOS" target="_blank" class="btn github">GitHub个人主页</a>
                    </div>
                </div>
            </div>
        </div>
    </section>


    <!-- 页脚 -->
    <footer id="footer"></footer>

    <script src="/js/script.js"></script>
